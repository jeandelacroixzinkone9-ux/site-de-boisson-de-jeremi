<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boutique Whisky Ouaga</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#000;color:white;}

.header{
text-align:center;
padding:30px;
border-bottom:2px solid gold;
}

h1{color:gold;}

.hero{padding:40px;text-align:center;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
border:1px solid gold;
padding:20px;
border-radius:10px;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.btn{
background:gold;
color:black;
padding:10px;
display:inline-block;
margin-top:10px;
text-decoration:none;
}

#installBtn{
display:none;
position:fixed;
bottom:80px;
right:20px;
background:gold;
color:black;
padding:12px;
border:none;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h1>🥃 Boutique Whisky</h1>
<p>Livraison rapide à Ouaga</p>
<button id="installBtn">📲 Installer</button>
</div>

<div class="hero">
<h2>Produits disponibles</h2>
</div>

<div class="grid">

<div class="card">
<img src="red-label.jpg">
<h3>Red Label</h3>
<p>8000 FCFA</p>
<a href="https://wa.me/22662003688" class="btn">Commander</a>
</div>

<div class="card">
<img src="jack-daniel.jpg">
<h3>Jack Daniel's</h3>
<p>14000 FCFA</p>
<a href="https://wa.me/22662003688" class="btn">Commander</a>
</div>

<div class="card">
<img src="double-black.jpg">
<h3>Double Black</h3>
<p>20000 FCFA</p>
<a href="https://wa.me/22662003688" class="btn">Commander</a>
</div>

</div>

<a href="https://wa.me/22662003688" class="whatsapp">💬</a>

<script>
// INSTALL APP
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
    });
  }
});

// SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
